global:
  namespace: Development
  env_name: test
  container_name: "test.test_app.helloworld.sz1"

server:
  app: test
  server: helloworld_client
  admin:
    port: 9029

client:
  filter:
    - prometheus
  service:
    - name: trpc.test.helloworld.Greeter
      network: tcp
      protocol: trpc
      transport: tnet
      target: dns://robust-server:8000  # Used in docker.
      # target: ip://127.0.0.1:8000
      timeout: 400

plugins:
  log:
    default: 
      - writer: console
        level: debug 
      - writer: file 
        level: debug 
        writer_config:
          log_path:
          filename: ./client.log 
          roll_type: size
          max_age: 7 
          max_size: 10
          max_backups: 10 
          compress: false 
  metrics:
    prometheus:
      ip: 0.0.0.0 
      port: 8092
      path: /metrics 
      namespace: Development 
      subsystem: trpc 
      rawmode: false 
      enablepush: false
      job: job 
      pushinterval: 1 
