global:
  scrape_interval: 1s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'robust-server'
    static_configs:
      - targets: ['robust-server:8090']
  - job_name: 'robust-client'
    static_configs:
      - targets: ['robust-client:8092']
