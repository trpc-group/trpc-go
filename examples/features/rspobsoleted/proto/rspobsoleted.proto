syntax = "proto3";
package trpc.examples.rspobsoleted;

option go_package ="trpc.group/trpc-go/trpc-go/examples/features/rspobsoleted/proto";

service RspObsoletedExample {
  rpc Hello (Request) returns (Response);
}

message Request {
  bytes msg = 1;
}

message Response { 
  bytes msg = 1;
}
